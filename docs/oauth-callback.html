<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MindByte Publisher - OAuth Callback</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body { font-family: -apple-system, Segoe UI, Roboto, Arial, sans-serif; max-width: 720px; margin: 80px auto; padding: 0 20px; line-height: 1.6; color: #1a1a1a; text-align: center; }
code { background: #f2f2f2; padding: 2px 6px; border-radius: 4px; }
</style>
</head>
<body>
<h1>Authorization received</h1>
<p>Copy the <code>code</code> value from this page's address bar and paste it back into the
<code>tiktok_auth.py</code> script that sent you here.</p>
<p id="hint"></p>
<script>
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code) {
    document.getElementById('hint').textContent = 'Detected code: ' + code;
  }
</script>
</body>
</html>
