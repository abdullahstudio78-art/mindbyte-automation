name: Publish Long-Form Video

on:
  # Weekly auto-schedule enabled 2026-07-23 - user reviewed run #9 (the
  # first run using the new footage-only cinematic pipeline + real-frame
  # thumbnail, commit 3d6f3cf) and approved: real human B-roll matching the
  # storyboard, clean cinematic thumbnail ("Silent Ruin", 8:21, quality
  # score 9), pre-publish checklist passed. Long-form is weekly (not
  # daily, per the "daily Shorts + weekly long-form" plan) - Sundays,
  # a few hours after the Weekly Content Review (12:00 UTC) and outside
  # the daily Shorts publish window (14:00 UTC), so it doesn't compete for
  # GitHub Actions runners with either.
  schedule:
    - cron: '0 16 * * 0'
  workflow_dispatch: {}

jobs:
  publish-longform:
    runs-on: ubuntu-latest
    # Longer than the Shorts workflow's 30 minutes - a paragraph-chunked
    # 8-15 minute video means more TTS calls, more Pexels downloads, and a
    # much longer ffmpeg render/concat than a 30-60 second Short.
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run long-form pipeline
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          OAUTH_CLIENT_ID: ${{ secrets.OAUTH_CLIENT_ID }}
          OAUTH_CLIENT_SECRET: ${{ secrets.OAUTH_CLIENT_SECRET }}
          OAUTH_REFRESH_TOKEN: ${{ secrets.OAUTH_REFRESH_TOKEN }}
          YOUTUBE_CHANNEL_ID: ${{ secrets.YOUTUBE_CHANNEL_ID }}
          GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
        run: python pipeline_longform.py
